; ============================================================
; k4eru — ESP32-S3 N16R8 + CYD 2.8" Resistive Touch
; MCU  : ESP32-S3 (16 MB Flash, 8 MB OPI PSRAM)
; Board: Cheap Yellow Display 2.8" dual USB-C (ILI9341 / XPT2046)
; ============================================================
;
; WHY THIS EXISTS:
;   Pre-compiled CYD bins target the classic ESP32 (Xtensa LX6).
;   Your board uses ESP32-S3 (Xtensa LX7) — a different ISA.
;   Flashing a WROOM binary on S3 causes the white screen of death.
;   Building from source with this config generates a native S3 binary.
;
; TFT PINS (ILI9341 via HSPI — same physical layout as CYD 2USB):
;   MOSI=13  MISO=12  SCLK=14  CS=15  DC=2  RST=-1  BL=21
;   Touch XPT2046: TOUCH_CS=33
;   SD card: SD_CS=5
;
; PLATFORM PINNING (espressif32 @ ~5.4):
;   espressif32 5.x  ↔  Arduino-ESP32 v2.x  ↔  ESP-IDF v4.4.x
;   All bundled libraries (NimBLE, TFT_eSPI, etc.) target this IDF version.
;   Upgrading to espressif32 6.x (IDF v5.x) breaks NimBLE and other APIs.
; ============================================================

; src_dir must live in [platformio] section — overridden per-env via build_src_filter
[platformio]
src_dir = esp32_marauder

; ── Shared base config ────────────────────────────────────────
[env_base]
platform  = espressif32 @ 6.4.0
board     = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size              = 16MB
board_build.flash_size               = 16MB
board_build.partitions               = default_16MB.csv
board_build.arduino.memory_type      = qio_opi
upload_speed  = 921600
monitor_speed = 115200
upload_port   = /dev/ttyUSB0
monitor_dtr   = 0
monitor_rts   = 0
lib_extra_dirs = libraries
lib_ldf_mode    = deep+
lib_compat_mode = off
lib_ignore      = TFT_eSPI-CYD
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-deprecated-declarations
    -Wno-sign-compare

; ── Marauder (full build) ─────────────────────────────────────
[env:cyd28_s3]
extends = env_base
lib_deps = h2zero/NimBLE-Arduino @ ~1.4.0
build_flags =
    ${env_base.build_flags}
    -Wl,--allow-multiple-definition
    ; SD_MMC (framework lib) needs FS/src on include path when compiled standalone by LDF.
    -I/home/adriel_ubuntu/.platformio/packages/framework-arduinoespressif32@3.20011.230801/libraries/FS/src

; ── Minimal TFT diagnostic (no Marauder) ─────────────────────
; Flashes RED/GREEN/BLUE then prints "TFT OK" — confirms SPI pins
[env:tft_diag]
extends = env_base
build_src_filter = -<*> +<../tft_diag/>
